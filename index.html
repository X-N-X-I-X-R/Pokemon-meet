<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>PokéStall - האירוע הרשמי</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pokedex-red: #dc0a2d;
            --pokedex-dark-red: #8b0000;
            --screen-blue: #28a0ed;
            --pika-yellow: #fbd100;
            --gameboy-green: #51ad60;
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * { box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            padding: clamp(6px, 2vw, 16px);
            background: radial-gradient(circle at 50% 30%, #2c3e50 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* שלדת הפוקדקס - ממלאת את גובה המסך */
        .pokedex-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 880px;
            background: var(--pokedex-red);
            border: clamp(4px, 1.5vw, 8px) solid #222;
            border-radius: clamp(20px, 6vw, 36px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* נורות הלד */
        .top-lights {
            flex-shrink: 0;
            padding: clamp(8px, 2vh, 16px) clamp(12px, 4vw, 22px);
            display: flex;
            align-items: center;
            gap: clamp(8px, 2.5vw, 14px);
            background: var(--pokedex-dark-red);
            border-bottom: 4px solid #222;
        }

        .big-blue-light {
            width: clamp(30px, 9vw, 46px);
            height: clamp(30px, 9vw, 46px);
            border-radius: 50%;
            border: 3px solid #fff;
            background: radial-gradient(circle at 30% 30%, #6cc6ff, #28a0ed 45%, #003a66);
            animation: pulse 2s infinite;
        }

        .small-light {
            width: clamp(10px, 3vw, 15px);
            height: clamp(10px, 3vw, 15px);
            border-radius: 50%;
            border: 2px solid #333;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 8px #28a0ed; }
            50% { box-shadow: 0 0 22px #28a0ed; }
        }

        /* המסך המרכזי - גמיש וממלא את המקום שנשאר */
        .pokedex-screen {
            flex: 1;
            min-height: 0;
            background: #dedede;
            margin: clamp(8px, 2vh, 16px);
            border-radius: clamp(12px, 3vw, 18px);
            border: clamp(6px, 2vw, 12px) solid #222;
            color: #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen-header {
            flex-shrink: 0;
            background: var(--gameboy-green);
            padding: clamp(8px, 1.6vh, 14px) 10px;
            text-align: center;
            border-bottom: 3px solid #222;
        }

        .screen-header h1 {
            margin: 0;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #16331b;
            font-size: clamp(1rem, 4.2vw, 1.4rem);
            line-height: 1.1;
        }

        .screen-header span {
            display: block;
            font-size: clamp(0.6rem, 2.4vw, 0.78rem);
            font-weight: 600;
            color: #2e6b39;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        /* גוף המסך - מחלק את התוכן בגובה */
        .screen-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: clamp(8px, 2vh, 14px);
            gap: clamp(8px, 1.6vh, 14px);
        }

        /* כרטיסי האספנות - תמיד 2 בשורה */
        .card-grid {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(8px, 2.5vw, 14px);
        }

        .tcg-card {
            background: #fff;
            border-radius: 10px;
            padding: clamp(6px, 1.5vw, 10px);
            border: clamp(3px, 1.2vw, 6px) solid #e5c05b;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .tcg-card:active,
        .tcg-card:hover {
            transform: translateY(-4px) rotate(1.5deg);
            box-shadow: 0 12px 24px rgba(0,0,0,0.35);
        }

        /* אפקט הברק ההולוגרפי */
        .holo-shine::before {
            content: "";
            position: absolute;
            inset: -100%;
            background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.35) 30%, rgba(255,0,0,0.2) 40%, rgba(0,255,0,0.2) 50%, rgba(0,0,255,0.2) 60%, transparent 80%);
            transition: 0.5s;
            pointer-events: none;
            transform: translate(-25%, -25%);
        }
        .tcg-card:hover .holo-shine::before,
        .tcg-card:active .holo-shine::before {
            transform: translate(25%, 25%);
        }

        .card-image {
            flex: 1;
            min-height: 0;
            background: #f4f4f4;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: clamp(5px, 1vh, 9px);
            border: 2px solid #e0e0e0;
            padding: 4px;
        }

        .card-image svg { width: auto; height: 100%; max-height: 90px; }
        .pika-svg { filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2)); }

        .soccer-card { background: var(--gold); color: #443300; border-color: #aa771c; }
        .soccer-card .card-image { background: rgba(0,0,0,0.12); }

        .card-title { font-weight: 800; font-size: clamp(0.72rem, 2.8vw, 0.95rem); color: #111; }
        .soccer-card .card-title { color: #443300; }
        .card-sub { font-size: clamp(0.6rem, 2.2vw, 0.78rem); color: #666; }
        .soccer-card .card-sub { color: #5c4a14; }
        .card-rank { text-align: left; font-size: clamp(0.58rem, 2.1vw, 0.74rem); color: #e5a700; font-weight: 700; margin-top: 2px; }
        .soccer-card .card-rank { color: #6b5410; }

        /* הודעה חשובה */
        .important-msg {
            flex-shrink: 0;
            background: #ffcc00;
            color: #000;
            padding: clamp(8px, 1.6vh, 13px) 10px;
            text-align: center;
            font-weight: 900;
            font-size: clamp(0.74rem, 3vw, 0.95rem);
            line-height: 1.25;
            border-radius: 10px;
            box-shadow: 4px 4px 0 #000;
        }

        /* מידע הטריינר */
        .trainer-info {
            flex-shrink: 0;
            background: #222;
            color: var(--gameboy-green);
            padding: clamp(9px, 1.8vh, 14px) clamp(12px, 4vw, 18px);
            font-family: 'Courier New', monospace;
            font-size: clamp(0.66rem, 2.6vw, 0.86rem);
            line-height: 1.7;
            border-radius: 10px;
            border: 2px solid #000;
        }
        .trainer-info b { color: var(--pika-yellow); }

        /* כפתורי הפוקדקס */
        .pokedex-buttons {
            flex-shrink: 0;
            padding: clamp(6px, 1.4vh, 14px) clamp(16px, 5vw, 26px) clamp(10px, 2vh, 18px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .d-pad {
            width: clamp(48px, 14vw, 70px);
            height: clamp(48px, 14vw, 70px);
            background: #222;
            clip-path: polygon(35% 0%, 65% 0%, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%, 0% 35%, 35% 35%);
        }

        .action-buttons { display: flex; gap: 10px; }
        .action-buttons div {
            width: clamp(28px, 8vw, 40px);
            height: clamp(28px, 8vw, 40px);
            background: #222;
            border-radius: 50%;
            box-shadow: 3px 3px 0 #000;
        }
    </style>
</head>
<body>

    <div class="pokedex-container">
        <div class="top-lights">
            <div class="big-blue-light"></div>
            <div class="small-light" style="background:#8b0000;"></div>
            <div class="small-light" style="background:#daa520;"></div>
            <div class="small-light" style="background:#228b22;"></div>
        </div>

        <div class="pokedex-screen">
            <div class="screen-header">
                <h1>דוכן הפוקימון</h1>
                <span>TRAINER EVENT</span>
            </div>

            <div class="screen-body">
                <div class="card-grid">
                    <!-- קלף פוקימון הולוגרפי -->
                    <div class="tcg-card holo-shine">
                        <div class="card-image">
                            <svg class="pika-svg" viewBox="0 0 100 100">
                                <path d="M30 25 Q10 0 25 0 L40 25 M70 25 Q90 0 75 0 L60 25" fill="#333"/>
                                <path d="M32 28 Q15 5 28 5 L42 28 M68 28 Q85 5 72 5 L58 28" fill="#fbd100"/>
                                <circle cx="50" cy="55" r="35" fill="#fbd100" stroke="#333" stroke-width="1.5"/>
                                <circle cx="35" cy="50" r="4.5" fill="#333"/> <circle cx="36.5" cy="48.5" r="1.5" fill="white"/>
                                <circle cx="65" cy="50" r="4.5" fill="#333"/> <circle cx="66.5" cy="48.5" r="1.5" fill="white"/>
                                <circle cx="22" cy="65" r="7" fill="#ff4444" opacity="0.8"/>
                                <circle cx="78" cy="65" r="7" fill="#ff4444" opacity="0.8"/>
                                <path d="M45 65 Q50 70 55 65" fill="none" stroke="#333" stroke-width="2"/>
                                <path d="M85 85 L95 65 L80 70 L90 50 L75 60" fill="none" stroke="#fbd100" stroke-width="4" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div class="card-title">קלפי Rare / Ultra</div>
                        <div class="card-sub">שווי שוק: $0.90 - $20.00</div>
                        <div class="card-rank">★★★★★</div>
                    </div>

                    <!-- קלף כדורגל מוזהב -->
                    <div class="tcg-card soccer-card holo-shine">
                        <div class="card-image">
                            <svg viewBox="0 0 24 24" fill="#443300">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                <path d="M12 7l-1.5 4.5H6l3.75 3L8.25 19 12 16.5l3.75 2.5-1.5-4.5 3.75-3h-4.5L12 7z"/>
                            </svg>
                        </div>
                        <div class="card-title">קלפי כדורגל VIP</div>
                        <div class="card-sub">מהדורות זהב מוגבלות</div>
                        <div class="card-rank">ELITE SERIES</div>
                    </div>
                </div>

                <div class="important-msg">
                    ⚠️ תשלום בשקלים בלבד (מזומן)! אין אפשרות לדולרים.
                </div>

                <div class="trainer-info">
                    > LOCATION: <b>MEYBLOOM 13</b> (UNDER BUILDING)<br>
                    > DATE: <b>MAY 30TH</b> &nbsp; > TIME: <b>10:00 AM</b><br>
                    > STATUS: READY FOR TRADES_
                </div>
            </div>
        </div>

        <div class="pokedex-buttons">
            <div class="d-pad"></div>
            <div class="action-buttons">
                <div></div>
                <div></div>
            </div>
        </div>
    </div>

</body>
</html>
