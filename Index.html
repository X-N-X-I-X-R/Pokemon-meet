<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéStall - Ultra Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pd-red: #f00000;
            --pd-blue: #0073ad;
            --pd-dark: #222;
            --gold-grad: linear-gradient(45deg, #d4af37, #f9f295, #ab8e28);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: radial-gradient(circle, #1a1a2e 0%, #080808 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            perspective: 1000px;
            color: white;
            overflow-x: hidden;
        }

        /* שלדת הפוקדקס - עיצוב תלת מימדי */
        .pokedex {
            width: 95%;
            max-width: 850px;
            background: var(--pd-red);
            border: 6px solid #333;
            border-radius: 20px 80px 20px 20px;
            box-shadow: 20px 20px 0 #8b0000, 0 30px 50px rgba(0,0,0,0.7);
            position: relative;
            padding-bottom: 30px;
        }

        /* נורת הלד הראשית */
        .pokedex-header {
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 4px solid #333;
            background: #cc0000;
            border-radius: 14px 74px 0 0;
        }

        .lens {
            width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #fff, #28a0ed 40%, #000);
            border: 5px solid white;
            border-radius: 50%;
            box-shadow: 0 0 20px #28a0ed;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3) drop-shadow(0 0 15px #28a0ed); }
        }

        /* מסך התצוגה */
        .screen-container {
            background: #333;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            border-bottom-left-radius: 40px;
            position: relative;
        }

        .inner-screen {
            background: #98cb98; /* צבע Gameboy קלאסי */
            height: 500px;
            border-radius: 5px;
            border: 4px solid #111;
            overflow-y: auto;
            color: #1a3a1f;
            position: relative;
        }

        /* אפקט Scanlines למראה רטרו */
        .inner-screen::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* כרטיסי אספנות עם Tilt Effect */
        .card-row {
            display: flex;
            gap: 20px;
            padding: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .trainer-card {
            width: 200px;
            background: #fff;
            border: 8px solid #e5c05b;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
        }

        .trainer-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: holo 3s infinite;
        }

        @keyframes holo {
            0% { background-position: 200% 200%; }
            100% { background-position: -200% -200%; }
        }

        .card-img-box {
            background: #f0f0f0;
            height: 130px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* טרמינולוגיה ומשימות */
        .quest-log {
            padding: 20px;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            line-height: 1.2;
        }

        .status-badge {
            background: #1a3a1f;
            color: #98cb98;
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* כפתורי הפוקדקס */
        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            align-items: center;
        }

        .d-pad {
            width: 80px; height: 80px;
            background: #333;
            clip-path: polygon(35% 0%, 65% 0%, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%, 0% 35%, 35% 35%);
            box-shadow: inset 0 0 10px #000;
        }

        .action-btns {
            display: flex;
            gap: 15px;
        }

        .btn-round {
            width: 45px; height: 45px;
            background: #333;
            border-radius: 50%;
            box-shadow: 4px 4px 0 #111;
            cursor: pointer;
            active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #111; }
        }

        .warning-scroll {
            background: #111;
            color: #f00;
            padding: 10px;
            text-align: center;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            border: 2px solid #f00;
            margin: 10px;
        }

        @media (max-width: 600px) {
            .card-row { flex-direction: column; align-items: center; }
            .inner-screen { height: auto; min-height: 400px; }
        }
    </style>
</head>
<body>

    <div class="pokedex" id="pokedex">
        <div class="pokedex-header">
            <div class="lens"></div>
            <div style="width: 15px; height: 15px; background: #8b0000; border-radius: 50%;"></div>
            <div style="width: 15px; height: 15px; background: #ffcc00; border-radius: 50%;"></div>
            <div style="width: 15px; height: 15px; background: #228b22; border-radius: 50%;"></div>
        </div>

        <div class="screen-container">
            <div class="inner-screen">
                <div style="text-align:center; padding: 20px;">
                    <h1 style="margin:0; font-weight: 900; font-size: 2.2rem; text-shadow: 2px 2px #77a877;">דוכן פוקימון & כדורגל</h1>
                    <div class="status-badge">TRAINER MISSION: ACTIVE</div>
                </div>

                <div class="card-row">
                    <!-- קלף פוקימון -->
                    <div class="trainer-card" onmousemove="tilt(event, this)" onmouseleave="resetTilt(this)">
                        <div class="card-img-box">
                            <svg width="100" height="100" viewBox="0 0 100 100">
                                <!-- Pikachu Ultra Detail -->
                                <path d="M30 25 Q10 0 25 0 L40 25 M70 25 Q90 0 75 0 L60 25" fill="#333"/>
                                <path d="M32 28 Q15 5 28 5 L42 28 M68 28 Q85 5 72 5 L58 28" fill="#FFCB05"/>
                                <circle cx="50" cy="55" r="35" fill="#FFCB05" stroke="#333" stroke-width="2"/>
                                <circle cx="38" cy="50" r="4" fill="#333"/> <circle cx="39" cy="48" r="1.5" fill="white"/>
                                <circle cx="62" cy="50" r="4" fill="#333"/> <circle cx="63" cy="48" r="1.5" fill="white"/>
                                <circle cx="25" cy="65" r="6" fill="#f00" opacity="0.6"/>
                                <circle cx="75" cy="65" r="6" fill="#f00" opacity="0.6"/>
                                <path d="M85 85 L95 65 L80 70 L90 50" fill="none" stroke="#FFCB05" stroke-width="5" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div style="color: #333; font-weight: 800;">קלפי Rare Market</div>
                        <div style="color: #666; font-size: 0.8rem;">שווי: $0.90 - $20.00</div>
                    </div>

                    <!-- קלף כדורגל -->
                    <div class="trainer-card" style="background: var(--gold-grad); border-color: #aa771c;" onmousemove="tilt(event, this)" onmouseleave="resetTilt(this)">
                        <div class="card-img-box" style="background: rgba(255,255,255,0.3);">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="#443300">
                                <circle cx="12" cy="12" r="10" stroke="#443300" stroke-width="1" fill="none"/>
                                <path d="M12 2L15 9H22L16 13L18 20L12 16L6 20L8 13L2 9H9L12 2Z" />
                            </svg>
                        </div>
                        <div style="color: #443300; font-weight: 800;">נבחרת ה-VIP</div>
                        <div style="color: #443300; font-size: 0.8rem;">קלפי אגדות כדורגל</div>
                    </div>
                </div>

                <div class="quest-log">
                    > LOCATION: מייתבלום 13 (מתחת לבניין)<br>
                    > DATE: 30 במאי<br>
                    > TIME: 10:00 בבוקר<br>
                    > TRADES: זמינים להחלפה
                </div>

                <div class="warning-scroll">
                    שקלים בלבד (מזומן)! NO DOLLARS ACCEPTED
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="d-pad"></div>
            <div class="action-btns">
                <div class="btn-round" style="background: #333;"></div>
                <div class="btn-round" style="background: #333;"></div>
            </div>
        </div>
    </div>

    <script>
        // פונקציית הטיה (Tilt) לקלפים
        function tilt(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 10;
            const rotateY = (centerX - x) / 10;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
        }

        function resetTilt(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        }
    </script>
</body>
</html>
